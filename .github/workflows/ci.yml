name: Release validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-validation:
    name: Release validation
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python 3.13.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"

      - name: Set up Node 22.23.1
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up uv 0.11.29
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend from clean output
        run: |
          rm -rf src/normflow/static
          npm run build

      - name: Run Python suite
        env:
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
        run: uv run --frozen --extra test pytest

      - name: Build and inspect release wheel
        run: ./scripts/build-wheel dist/ci-wheel

      - name: Build and smoke reproducible release payload
        run: ./scripts/build-release-payload dist/ci-release-payload
